when:
  - event: push
    branch: main

# Essa etiqueta garante que o Mac M1 nunca vai tocar nessa pipeline!
labels:
  platform: linux/arm64

clone:
  git:
    image: woodpeckerci/plugin-git
    extra_hosts:
      - "gitea.brunnoserver.duckdns.org:192.168.31.215"

steps:
  - name: testar-codigo
    image: oven/bun:latest
    commands:
      - echo "📦 Instalando dependências..."
      - bun install
      - echo "🔍 Verificando tipagem do App..."
      - bunx tsc --noEmit
      - echo "🔍 Verificando tipagem dos Scripts..."
      - bunx tsc --project scripts/tsconfig.json --noEmit

  - name: deploy-ota-staging
    image: oven/bun:latest
    environment:
      # Força o app.config.ts a ler as configurações de testes
      APP_ENV: staging
      EXPO_TOKEN:
        from_secret: expo_token
    commands:
      - echo "🚀 Empacotando e enviando atualização OTA para Staging..."
      # O $CI_COMMIT_MESSAGE captura a mensagem do seu commit no Git para usar no log do Expo!
      - bunx eas-cli update --branch staging --message "Push na main: $CI_COMMIT_MESSAGE" --non-interactive