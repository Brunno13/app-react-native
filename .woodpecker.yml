when:
  - event: push
    branch: main
  - event: tag

clone:
  git:
    image: woodpeckerci/plugin-git
    extra_hosts:
      - "gitea.brunnoserver.duckdns.org:192.168.31.215"

steps:
  # =========================================================
  # FASE 1: Verificação (Apenas no Push da Main) 
  # =========================================================
  - name: testar-codigo
    image: oven/bun:latest
    commands:
      - echo "📦 Instalando dependências..."
      - bun install
      - echo "🔍 Verificando tipagem do App (React Native)..."
      - bunx tsc --noEmit
      - echo "🔍 Verificando tipagem dos Scripts de Automação (Bun)..."
      - bunx tsc --project scripts/tsconfig.json --noEmit
    when:
      - event: push
        branch: main

  # =========================================================
  # FASE 2: Build do Android (Apenas na Tag)
  # =========================================================
  - name: build-apk
    image: ghcr.io/cirruslabs/android-sdk:34
    commands:
      # -----------------------------------------------------------------
      # PREPARANDO O AMBIENTE NATIVO ARM64 (Orange Pi)
      # -----------------------------------------------------------------
      - echo "🔧 Atualizando repositórios e instalando dependências base..."
      - apt-get update && apt-get install -y curl cmake ninja-build
      
      - echo "🔧 Instalando Node.js 20 (Obrigatório para o React Native)..."
      - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      - apt-get install -y nodejs
      
      - echo "🔗 Criando ponte de arquitetura (Enganando o Android SDK para usar ARM64)..."
      - mkdir -p /opt/android-sdk-linux/cmake/3.22.1/bin
      - rm -f /opt/android-sdk-linux/cmake/3.22.1/bin/cmake
      - rm -f /opt/android-sdk-linux/cmake/3.22.1/bin/ninja
      - ln -sf /usr/bin/cmake /opt/android-sdk-linux/cmake/3.22.1/bin/cmake
      - ln -sf /usr/bin/ninja /opt/android-sdk-linux/cmake/3.22.1/bin/ninja
      # -----------------------------------------------------------------
      
      - echo "🔧 Instalando o Bun no contêiner Android..."
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="$HOME/.bun/bin:$PATH"
      
      - echo "📦 Instalando dependências do projeto..."
      - bun install
      
      - echo "🚀 Executando o script Bun-Native de build (Produção)..."
      - bun run build:apk:prod
    when:
      - event: tag

  # =========================================================
  # FASE 3: Release no Gitea Interno (Apenas na Tag)
  # =========================================================
  - name: gerar-release-notes
    image: alpine
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - apk add --no-cache curl git jq
      - |
        set -e
        set -x
        
        git config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
        git fetch --all --unshallow || git fetch --all
        git fetch --tags
        
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %h %s")
        else
          CHANGELOG=$(git log --pretty=format:"- %h %s" $PREV_TAG..HEAD)
        fi
        
        RELEASE_BODY="🚀 Deploy automático do APK realizado com sucesso pelo Woodpecker CI. 
        
        ---
        
        $CHANGELOG"
        
        echo "$RELEASE_BODY" > .release_body.txt
        
        JSON_PAYLOAD=$(jq -n --arg tag "${CI_COMMIT_TAG}" --arg name "Versão ${CI_COMMIT_TAG}" --arg body "$RELEASE_BODY" '{tag_name: $tag, name: $name, body: $body}')
        
        echo "=== ENVIANDO RELEASE PARA O GITEA ==="
        RESPONSE=$(curl -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases" -H "accept: application/json" -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" -d "$JSON_PAYLOAD")
        
        echo "Resposta da API do Gitea: $RESPONSE"
        RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
        
        if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
          echo "❌ ERRO: O Gitea não retornou um ID válido. Se a Tag já existir, apague-a no painel e tente novamente."
          exit 1
        fi
        
        echo "=== INICIANDO UPLOAD DO APK ==="
        # Realiza o upload do APK gerado na FASE 2
        curl -f -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases/$RELEASE_ID/assets?name=app-react-native-production.apk" -H "Authorization: token $GITEA_TOKEN" -F "attachment=@./app-react-native-production.apk"
        
        echo "✅ DEPLOY FINALIZADO COM SUCESSO NO GITEA!"
    when:
      - event: tag

